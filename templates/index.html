<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Splitter Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    
    <nav class="p-6 border-b border-slate-800">
        <h1 class="text-2xl font-bold text-green-400">🏃 Trail Splitter Pro</h1>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-slate-800 p-6 rounded-xl shadow-xl space-y-6">
                <h2 class="text-xl font-semibold mb-4 text-green-400">📁 Données & Objectifs</h2>
                
                <div>
                    <label class="block text-sm font-medium mb-2 text-slate-300">Fichier GPX</label>
                    <input type="file" id="gpxFile" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700 cursor-pointer"/>
                </div>

                <hr class="border-slate-700">

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Ta Côte UTMB</label>
                    <input type="number" id="input_cote" value="500" min="200" max="1000" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none focus:border-green-400 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Temps visé (heures)</label>
                    <div id="display_temps" class="text-2xl font-mono font-bold text-green-400 mb-1">0 : 00 : 00</div>
                    <input type="number" id="input_temps" value="0" step="0.25" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none focus:border-green-400 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Allure (min/km)</label>
                    <div id="display_allure" class="text-2xl font-mono font-bold text-green-400 mb-1">0 : 00</div>
                    <input type="number" id="input_allure" value="0" step="0.1" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white outline-none focus:border-green-400 transition-all">
                </div>
            </div>

            <div class="md:col-span-2 space-y-8">
    <div id="chart_area" class="bg-slate-800 p-4 rounded-xl shadow-xl hidden">
        <div id="elevation_chart" style="width:100%;height:400px;"></div>
    </div>

    <div id="table_area" class="bg-slate-800 p-6 rounded-xl shadow-xl hidden">
        <h3 class="text-xl font-bold text-green-400 mb-4">📋 Tableau de marche</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-slate-700 text-slate-400 text-sm">
                        <th class="p-2">Section</th>
                        <th class="p-2">Dist. (km)</th>
                        <th class="p-2">D+ (m)</th>
                        <th class="p-2">Allure</th>
                        <th class="p-2">Chrono</th>
                    </tr>
                </thead>
                <tbody id="segments_body">
                    </tbody>
            </table>
        </div>
    </div>
    
    <div id="placeholder_msg" class="bg-slate-800 p-20 rounded-xl border-2 border-dashed border-slate-700 text-center">
        <p class="text-slate-500 italic">Chargez un fichier GPX pour commencer.</p>
    </div>
</div>

        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
